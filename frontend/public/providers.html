<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Providers Testing - ICU</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Inventory Control Utility (ICU) v1.0.0</h1>
    </header>
    
    <nav>
        <a href="index.html" class="nav-link">Home</a>
        <a href="items.html" class="nav-link">Items</a>
        <a href="purchases.html" class="nav-link">Purchases</a>
        <a href="reviews.html" class="nav-link">Reviews</a>
        <a href="providers.html" class="nav-link" style="background-color: #2c3e50;">Providers</a>
    </nav>
    
    <main>
        <div id="message" class="message"></div>
        
        <div class="container">
            <h2>WireMock Provider Testing</h2>
            
            <!-- Provider Information -->
            <div id="providerInfo" style="margin-bottom: 2rem; background-color: #f0f8ff; padding: 1.5rem; border-left: 4px solid #3498db; border-radius: 3px;">
                <h3>Available Providers</h3>
                <div id="providersList"></div>
            </div>
            
            <!-- Provider Test Form -->
            <form id="testProviderForm">
                <h3>Test Provider Endpoint</h3>
                
                <div class="form-group">
                    <label for="provider">Select Provider</label>
                    <select id="provider" name="provider" required>
                        <option value="">-- Select a provider --</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="testItems">Items JSON (or use predefined)</label>
                    <textarea 
                        id="testItems" 
                        name="testItems" 
                        rows="6" 
                        placeholder='[{"id": 1, "name": "Widget A", "quantity": 5}]'
                        required></textarea>
                </div>
                
                <div style="margin-bottom: 1rem;">
                    <button type="button" class="btn-secondary" onclick="loadPredefinedItems()">Load Predefined Items</button>
                    <button type="button" class="btn-secondary" onclick="clearItems()">Clear</button>
                </div>
                
                <button type="submit" class="btn-primary">Test Provider</button>
            </form>
            
            <!-- Test Results -->
            <div id="resultsSection" style="display: none; margin-top: 2rem;">
                <h3>Test Results</h3>
                
                <div id="resultStatus" style="margin-bottom: 1rem; padding: 1rem; border-radius: 3px; display: none;"></div>
                
                <div style="background-color: #f9f9f9; padding: 1.5rem; border-radius: 3px; margin-bottom: 1rem;">
                    <h4>Response Details</h4>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <strong>Status Code:</strong>
                        <span id="resultStatusCode"></span>
                    </div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <strong>Response Time:</strong>
                        <span id="resultResponseTime"></span>
                    </div>
                </div>
                
                <div style="background-color: #f9f9f9; padding: 1.5rem; border-radius: 3px; margin-bottom: 1rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <h4>Response Body</h4>
                        <button type="button" class="btn-secondary" onclick="copyResponseToClipboard()">Copy JSON</button>
                    </div>
                    <pre id="resultBody" style="background-color: #f0f0f0; padding: 1rem; border-radius: 3px; overflow-x: auto;"></pre>
                </div>
            </div>
        </div>
    </main>
    
    <script src="app.js"></script>
    <script src="providers.js"></script>
</body>
</html>
