name: Build and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build Docker images
        run: docker-compose build
      
      - name: Start services
        run: docker-compose up -d
      
      - name: Wait for services to be ready
        run: |
          sleep 15
          for i in {1..10}; do
            curl -f http://localhost:5000/item && break
            sleep 3
          done
      
      - name: Run Items Service Tests
        run: docker-compose exec -T items-service python -m pytest test_items.py -v
      
      - name: Run Reviews Service Tests
        run: docker-compose exec -T reviews-service mvn test
      
      - name: Verify API Endpoints
        run: |
          echo "Testing Items Service..."
          curl -f http://localhost:5000/item || exit 1
          curl -f http://localhost:5000/purchase || exit 1
          
          echo "Testing Reviews Service..."
          curl -f http://localhost:8081/review || exit 1
          
          echo "Testing Frontend..."
          curl -f http://localhost:3000/health || exit 1
      
      - name: Stop services
        if: always()
        run: docker-compose down
